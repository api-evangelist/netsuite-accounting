aid: netsuite-accounting
name: NetSuite Accounting
description: >-
  NetSuite Accounting is the cloud financial management module of Oracle
  NetSuite that delivers general ledger, accounts payable and receivable,
  cash management, tax management, fixed assets, and real-time financial
  reporting and consolidation for growing businesses. NetSuite exposes its
  accounting records (invoices, bills, journal entries, payments, accounts,
  customers, vendors, and ledgers) through SuiteTalk REST and SOAP web
  services, SuiteQL queries, and RESTlets, secured with OAuth 2.0 and
  token-based authentication for ERP and finance integrations.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Accounting
  - Financials
  - General Ledger
  - Accounts Payable
  - Accounts Receivable
  - ERP
  - Cloud Accounting
  - NetSuite
url: https://raw.githubusercontent.com/api-evangelist/netsuite-accounting/refs/heads/main/apis.yml
created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: netsuite-accounting:suitetalk-rest
    name: NetSuite SuiteTalk REST Web Services
    description: >-
      REST API exposing NetSuite accounting and financial records as JSON
      resources including invoices, bills, journal entries, payments, accounts,
      customers, and vendors, with SuiteQL query support and an OpenAPI 3.0
      metadata definition. Authenticates with OAuth 2.0 or TBA.
    humanURL: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/book_1559132836.html
    baseURL: https://{accountid}.suitetalk.api.netsuite.com/services/rest
    tags:
      - REST
      - SuiteQL
      - OAuth 2.0
      - TBA
      - Invoices
      - Journal Entries
      - General Ledger
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/book_1559132836.html
      - type: Overview
        url: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/chapter_1540391670.html
      - type: API Browser
        url: https://system.netsuite.com/help/helpcenter/en_US/APIs/REST_API_Browser/record/v1/2023.1/index.html
  - aid: netsuite-accounting:suitetalk-soap
    name: NetSuite SuiteTalk SOAP Web Services
    description: >-
      Long-standing SOAP-based integration API to NetSuite accounting records
      and business logic, suitable for bulk financial operations, custom
      records, and legacy accounting integration scenarios.
    humanURL: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/book_1495296234.html
    baseURL: https://{accountid}.suitetalk.api.netsuite.com/services/NetSuitePort_{version}
    tags:
      - SOAP
      - Web Services
      - ERP
      - Accounting
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/book_1495296234.html
  - aid: netsuite-accounting:restlets
    name: NetSuite RESTlets
    description: >-
      Framework for exposing custom SuiteScript as REST endpoints hosted in
      NetSuite, enabling tailored accounting integrations and custom financial
      business logic that goes beyond the standard SuiteTalk APIs.
    humanURL: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/chapter_4618456517.html
    baseURL: https://{accountid}.restlets.api.netsuite.com/app/site/hosting/restlet.nl
    tags:
      - RESTlet
      - SuiteScript
      - Custom Endpoints
    properties:
      - type: Documentation
        url: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/chapter_4618456517.html
